apiVersion: v1
kind: Service
metadata:
  name: {{ include "tippspiel.fullname" . }}-kafka
  labels:
    {{- include "tippspiel.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  clusterIP: None   # headless — required for KRaft quorum voter DNS
  selector:
    {{- include "tippspiel.selectorLabels" (dict "component" "kafka" "context" .) | nindent 4 }}
  ports:
    - name: broker
      port: 9092
      targetPort: broker
    - name: controller
      port: 9093
      targetPort: controller
