apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tippspiel.fullname" . }}-kafka
  labels:
    {{- include "tippspiel.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  serviceName: {{ include "tippspiel.fullname" . }}-kafka
  replicas: 1
  selector:
    matchLabels:
      {{- include "tippspiel.selectorLabels" (dict "component" "kafka" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tippspiel.selectorLabels" (dict "component" "kafka" "context" .) | nindent 8 }}
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              # Pod DNS: <statefulset-name>-0.<headless-service>.<namespace>.svc.cluster.local
              value: "PLAINTEXT://{{ include "tippspiel.fullname" . }}-kafka-0.{{ include "tippspiel.fullname" . }}-kafka:9092"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@{{ include "tippspiel.fullname" . }}-kafka-0.{{ include "tippspiel.fullname" . }}-kafka:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            exec:
              command:
                - kafka-topics.sh
                - --bootstrap-server
                - localhost:9092
                - --list
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - kafka-topics.sh
                - --bootstrap-server
                - localhost:9092
                - --list
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.kafka.storage }}
