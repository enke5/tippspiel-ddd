apiVersion: v1
kind: Service
metadata:
  name: {{ include "tippspiel.fullname" . }}-betting
  labels:
    {{- include "tippspiel.labels" . | nindent 4 }}
    app.kubernetes.io/component: betting
spec:
  type: {{ .Values.betting.service.type }}
  selector:
    {{- include "tippspiel.selectorLabels" (dict "component" "betting" "context" .) | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
