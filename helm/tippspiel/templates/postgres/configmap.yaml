apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tippspiel.fullname" . }}-postgres-init
  labels:
    {{- include "tippspiel.labels" . | nindent 4 }}
data:
  init.sql: |
    CREATE DATABASE {{ .Values.postgres.databases.tournament }};
    CREATE DATABASE {{ .Values.postgres.databases.betting }};
    GRANT ALL PRIVILEGES ON DATABASE {{ .Values.postgres.databases.tournament }} TO {{ .Values.postgres.credentials.user }};
    GRANT ALL PRIVILEGES ON DATABASE {{ .Values.postgres.databases.betting }} TO {{ .Values.postgres.credentials.user }};
