apiVersion: v1
kind: Service
metadata:
  name: {{ include "tippspiel.fullname" . }}-postgres
  labels:
    {{- include "tippspiel.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None   # headless — StatefulSet DNS: <name>-postgres-0.<name>-postgres
  selector:
    {{- include "tippspiel.selectorLabels" (dict "component" "postgres" "context" .) | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
