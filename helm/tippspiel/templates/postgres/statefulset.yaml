apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tippspiel.fullname" . }}-postgres
  labels:
    {{- include "tippspiel.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "tippspiel.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "tippspiel.selectorLabels" (dict "component" "postgres" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tippspiel.selectorLabels" (dict "component" "postgres" "context" .) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "tippspiel.fullname" . }}-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tippspiel.fullname" . }}-postgres
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.credentials.user | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.credentials.user | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "tippspiel.fullname" . }}-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
