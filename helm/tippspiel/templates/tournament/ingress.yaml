{{- if .Values.tournament.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tippspiel.fullname" . }}-tournament
  labels:
    {{- include "tippspiel.labels" . | nindent 4 }}
    app.kubernetes.io/component: tournament
spec:
  rules:
    - host: {{ .Values.tournament.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "tippspiel.fullname" . }}-tournament
                port:
                  name: http
{{- end }}
