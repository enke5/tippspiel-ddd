services:

  # ─── Kafka (KRaft — no ZooKeeper) ─────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: tippspiel-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 5

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tippspiel-postgres
    environment:
      POSTGRES_USER: tippspiel
      POSTGRES_PASSWORD: tippspiel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tippspiel"]
      interval: 5s
      retries: 10

  # ─── Tournament Management Service ────────────────────────────────────────
  tournament-management-service:
    build:
      context: .
      dockerfile: tournament-management-service/Dockerfile
    container_name: tippspiel-tournament
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/tournament_management
      DB_USER: tippspiel
      DB_PASSWORD: tippspiel
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ─── Betting & Scoring Service ────────────────────────────────────────────
  betting-scoring-service:
    build:
      context: .
      dockerfile: betting-scoring-service/Dockerfile
    container_name: tippspiel-betting
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/betting_scoring
      DB_USER: tippspiel
      DB_PASSWORD: tippspiel
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
